site_name: Hournest Dokumentation
site_description: Team-Urlaubsverwaltung - Dokumentation
site_url: "https://julian-w.github.io/Hournest/"

extra:
  alternate:
    - name: Deutsch
      link: https://julian-w.github.io/Hournest/
      lang: de
    - name: English
      link: https://julian-w.github.io/Hournest/en/
      lang: en

theme:
  name: material
  language: de
  palette:
    - scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Hellmodus
    - scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    logo: material/beehive-outline

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: de
          default: true
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Startseite: Home
            Überblick: Overview
            Voraussetzungen: Prerequisites
            Installation: Installation
            Konfiguration: Configuration
            Änderungsprotokoll: Changelog
            Endanwender: End User
            Erste Schritte: Getting Started
            Dashboard: Dashboard
            Kalender: Calendar
            Urlaubsanträge: Vacation Requests
            Urlaubskonto: Vacation Account
            Administration: Administration
            Benutzerverwaltung: User Management
            Feiertage verwalten: Manage Holidays
            Urlaubsplanung: Vacation Planning
            Einstellungen: Settings
            Entwickler: Developer
            Architektur: Architecture
            Backend: Backend
            Frontend: Frontend
            API-Referenz: API Reference
            Lokale Entwicklung: Local Development
            Demo-Modus: Demo Mode
            Mock-Modus: Mock Mode
            E2E-Tests: E2E Tests
            Tests: Tests
            Feature-Inventar: Feature Inventory
            Test-Matrix: Test Matrix
            Deployment: Deployment
            Zeiterfassung: Time Tracking
            Abwesenheiten: Absences
            Kostenstellen verwalten: Manage Cost Centers
            Benutzergruppen: User Groups
            Abwesenheitsverwaltung: Absence Management
            Berichte: Reports

nav:
  - Startseite:
      - Überblick: index.md
      - Voraussetzungen: home/prerequisites.md
      - Installation: home/installation.md
      - Konfiguration: home/configuration.md
      - Änderungsprotokoll: home/changelog.md
  - Endanwender:
      - Erste Schritte: user/index.md
      - Dashboard: user/dashboard.md
      - Kalender: user/calendar.md
      - Urlaubsanträge: user/vacations.md
      - Urlaubskonto: user/ledger.md
      - Zeiterfassung: user/time-tracking.md
      - Abwesenheiten: user/absences.md
      - Administration:
          - Benutzerverwaltung: user/admin/users.md
          - Feiertage verwalten: user/admin/holidays.md
          - Urlaubsplanung: user/admin/blackouts.md
          - Einstellungen: user/admin/settings.md
          - Kostenstellen verwalten: user/admin/cost-centers.md
          - Benutzergruppen: user/admin/user-groups.md
          - Abwesenheitsverwaltung: user/admin/absences.md
          - Berichte: user/admin/reports.md
  - Entwickler:
      - Architektur: dev/index.md
      - Lokale Entwicklung: dev/local-setup.md
      - Demo-Modus: dev/demo-mode.md
      - Backend: dev/backend.md
      - Frontend: dev/frontend.md
      - API-Referenz: dev/api.md
      - Mock-Modus: dev/mock-mode.md
      - E2E-Tests: dev/e2e.md
      - Tests: dev/tests.md
      - Feature-Inventar: dev/feature-inventory.md
      - Test-Matrix: dev/test-matrix.md
      - Deployment: dev/deployment.md
