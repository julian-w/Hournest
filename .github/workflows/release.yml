name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3, mbstring, openssl, tokenizer, xml, curl, fileinfo, zip
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare Laravel directories
        run: |
          mkdir -p backend/bootstrap/cache
          mkdir -p backend/storage/logs
          mkdir -p backend/storage/framework/cache
          mkdir -p backend/storage/framework/sessions
          mkdir -p backend/storage/framework/views

      # Backend Tests (with dev dependencies)
      - name: Install PHP dependencies (with dev)
        run: |
          cd backend
          composer install --no-interaction

      - name: Run backend tests
        run: |
          cd backend
          cp ../.env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan test

      # Reinstall without dev for production build
      - name: Install PHP dependencies (production)
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader --no-interaction

      # Frontend
      - name: Install npm dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Angular frontend unit tests
        run: |
          cd frontend
          npm run test:coverage:ci

      - name: Build Angular frontend
        run: |
          cd frontend
          npx ng build --configuration=production

      # Documentation
      - name: Install MkDocs dependencies
        run: pip install -r documentation/requirements.txt

      - name: Build documentation
        run: |
          cd documentation
          mkdocs build --clean

      # Package
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Assemble release package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PACKAGE_DIR="dist/hournest-${VERSION}"
          mkdir -p "$PACKAGE_DIR"

          # Backend (without dev files)
          rsync -a --exclude='node_modules' --exclude='.env' --exclude='tests' \
            --exclude='.phpunit.result.cache' \
            --exclude='phpunit.xml' --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='.git' --exclude='database/database.sqlite' \
            backend/ "$PACKAGE_DIR/"

          # Storage directories
          mkdir -p "$PACKAGE_DIR/bootstrap/cache"
          mkdir -p "$PACKAGE_DIR/storage/logs"
          mkdir -p "$PACKAGE_DIR/storage/framework/"{cache,sessions,views}

          # Env template
          cp .env.example "$PACKAGE_DIR/.env.example"

          # Frontend bundled directly into Laravel public/
          cp -r frontend/dist/frontend/browser/* "$PACKAGE_DIR/public/"

          # PHP installer
          cp scripts/install.php "$PACKAGE_DIR/install.php"
          cp scripts/test.php "$PACKAGE_DIR/test.php"

          # Documentation
          cp -r documentation/site "$PACKAGE_DIR/docs"

          # Deployment readme
          cat > "$PACKAGE_DIR/DEPLOY.md" <<'EOF'
          # Hournest Deployment

          1. Unpack the ZIP on your server.
          2. Upload the entire extracted directory.
          3. Point your web root to `public/`.
          4. Copy `.env.example` to `.env`.
          5. Optionally run `php test.php`.
          6. Set a valid bcrypt hash for `SUPERADMIN_PASSWORD`.
          7. Run `php install.php`.
          8. Delete `public/superadmin-password-helper.php` after setup.
          EOF

          # Create archives
          cd dist
          zip -r "hournest-${VERSION}.zip" "hournest-${VERSION}/"
          tar -czf "hournest-${VERSION}.tar.gz" "hournest-${VERSION}/"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hournest-${{ steps.version.outputs.VERSION }}
          path: |
            dist/hournest-${{ steps.version.outputs.VERSION }}.zip
            dist/hournest-${{ steps.version.outputs.VERSION }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hournest-${{ steps.version.outputs.VERSION }}.zip
            dist/hournest-${{ steps.version.outputs.VERSION }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
