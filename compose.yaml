services:
  hournest:
    build:
      context: .
    image: hournest:local
    init: true
    restart: unless-stopped
    ports:
      - "${HOURNEST_PORT:-8080}:80"
    environment:
      APP_NAME: ${APP_NAME:-Hournest}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:8080}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      HOURNEST_RUNTIME_MODE: ${HOURNEST_RUNTIME_MODE:-demo}
      HOURNEST_AUTO_MIGRATE: ${HOURNEST_AUTO_MIGRATE:-true}
      HOURNEST_ENABLE_SCHEDULER: ${HOURNEST_ENABLE_SCHEDULER:-true}
      HOURNEST_DEMO_REFRESH_ON_BOOT: ${HOURNEST_DEMO_REFRESH_ON_BOOT:-true}

      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      DB_USERNAME: ${DB_USERNAME:-}
      DB_PASSWORD: ${DB_PASSWORD:-}

      AUTH_OAUTH_ENABLED: ${AUTH_OAUTH_ENABLED:-false}

      DEMO_ENABLED: ${DEMO_ENABLED:-false}
      DEMO_REFERENCE_DATE: ${DEMO_REFERENCE_DATE:-now}
      DEMO_DATASET_VARIANT: ${DEMO_DATASET_VARIANT:-standard}
      DEMO_REFRESH_CRON: ${DEMO_REFRESH_CRON:-*/30 * * * *}
      DEMO_ALLOW_DEFAULT_PASSWORDS: ${DEMO_ALLOW_DEFAULT_PASSWORDS:-false}
      DEMO_REQUIRE_DEDICATED_DATABASE: ${DEMO_REQUIRE_DEDICATED_DATABASE:-true}
      DEMO_LOGIN_PASSWORD: ${DEMO_LOGIN_PASSWORD:-public-demo-password}
      DEMO_NOTICE: ${DEMO_NOTICE:-Public demo preview. Changes may be reset automatically and some admin actions are disabled.}

      DEMO_ALLOW_PASSWORD_CHANGE: ${DEMO_ALLOW_PASSWORD_CHANGE:-false}
      DEMO_ALLOW_USER_MANAGEMENT: ${DEMO_ALLOW_USER_MANAGEMENT:-false}
      DEMO_ALLOW_GLOBAL_SETTINGS_WRITE: ${DEMO_ALLOW_GLOBAL_SETTINGS_WRITE:-false}
      DEMO_ALLOW_HOLIDAY_WRITE: ${DEMO_ALLOW_HOLIDAY_WRITE:-false}
      DEMO_ALLOW_BLACKOUT_WRITE: ${DEMO_ALLOW_BLACKOUT_WRITE:-false}
      DEMO_ALLOW_WORK_SCHEDULE_WRITE: ${DEMO_ALLOW_WORK_SCHEDULE_WRITE:-false}
      DEMO_ALLOW_VACATION_LEDGER_WRITE: ${DEMO_ALLOW_VACATION_LEDGER_WRITE:-false}
      DEMO_ALLOW_WORK_TIME_ACCOUNT_WRITE: ${DEMO_ALLOW_WORK_TIME_ACCOUNT_WRITE:-false}
      DEMO_ALLOW_COST_CENTER_WRITE: ${DEMO_ALLOW_COST_CENTER_WRITE:-false}
      DEMO_ALLOW_USER_GROUP_WRITE: ${DEMO_ALLOW_USER_GROUP_WRITE:-false}
      DEMO_ALLOW_USER_COST_CENTER_WRITE: ${DEMO_ALLOW_USER_COST_CENTER_WRITE:-false}
      DEMO_ALLOW_TIME_LOCK_WRITE: ${DEMO_ALLOW_TIME_LOCK_WRITE:-false}
      DEMO_ALLOW_VACATION_WRITE: ${DEMO_ALLOW_VACATION_WRITE:-true}
      DEMO_ALLOW_ABSENCE_WRITE: ${DEMO_ALLOW_ABSENCE_WRITE:-true}
      DEMO_ALLOW_TIME_TRACKING_WRITE: ${DEMO_ALLOW_TIME_TRACKING_WRITE:-true}
      DEMO_ALLOW_TIME_BOOKING_TEMPLATE_WRITE: ${DEMO_ALLOW_TIME_BOOKING_TEMPLATE_WRITE:-true}
      DEMO_ALLOW_COST_CENTER_FAVORITES_WRITE: ${DEMO_ALLOW_COST_CENTER_FAVORITES_WRITE:-true}
      DEMO_ALLOW_ADMIN_REVIEW_WRITE: ${DEMO_ALLOW_ADMIN_REVIEW_WRITE:-true}

      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_WELLKNOWN_URL: ${OIDC_WELLKNOWN_URL:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}

      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@hournest.local}
    volumes:
      - hournest_storage:/var/www/html/storage
      - hournest_runtime:/var/lib/hournest

volumes:
  hournest_storage:
  hournest_runtime:
